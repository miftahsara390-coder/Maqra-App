<script>
        // Simple Micro-interaction for the timer display
        let seconds = 2712; // Starting at 00:45:12
        const timerElement = document.getElementById('timer');

        function formatTime(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            return [h, m, sec].map(v => v < 10 ? "0" + v : v).join(":");
        }

        setInterval(() => {
            // Only simulation for the UI
            // seconds++;
            // timerElement.textContent = formatTime(seconds);
        }, 1000);

        // Active state simulation for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => btn.classList.add('scale-95'));
            btn.addEventListener('touchend', () => btn.classList.remove('scale-95'));
        });
